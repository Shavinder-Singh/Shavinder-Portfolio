<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  /* Button */
  .scroll-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 90px;
    display: flex;
    flex-direction: column-reverse;
    /* IMPORTANT */
    align-items: flex-end;
    gap: 6px;
    cursor: pointer;
  }

  /* Lines */
  .line {
    height: 6px;
    background: #d4af37;
    opacity: 0;
    transform: translateY(30px);
    /* start from bottom */
    transition: all 0.3s ease;
    box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
  }
   .l1{
    width: 60px;
  }
  .l2{

    width: 50px;
  }
  .l3{
    width: 40px;

  }
  .l4{
    width: 30px;

  }
  .l5{

    width: 20px;
  }

  /* Show only bottom line initially */
  .l1 {
    opacity: 1;
    transform: translateY(0);
  }

  /* Hover → animate bottom to top */
  .scroll-btn:hover .l1 {
    transition-delay: 0s;
  }

  .scroll-btn:hover .l2 {
    transition-delay: 0.1s;
  }

  .scroll-btn:hover .l3 {
    transition-delay: 0.2s;
  }

  .scroll-btn:hover .l4 {
    transition-delay: 0.3s;
  }

  .scroll-btn:hover .l5 {
    transition-delay: 0.4s;
  }

  .scroll-btn:hover .line {
    opacity: 1;
    transform: translateY(0);
  }
</style>

<body>
 
</body>
<script>
  document.querySelector(".scroll-btn").onclick = function () {
    window.scrollTo({
      top: 0,
      behavior: "smooth"
    });
  };
</script>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<section class="contact_section">
  <div class="container">

    <!-- Title -->
    <div class="title">
      <button>Contact</button>
      <h2>Some of the noteworthy projects I have built:</h2>
    </div>

    <!-- Main Layout -->
    <div class="contact_wrapper">

      <!-- LEFT -->
      <div class="contact_information">
        
        <div class="info_top">
          <h2>Contact Information</h2>
          <p>Say something to start alive Chat</p>
        </div>

        <div class="info_items">
          <div class="info_row">
            <span>📞</span>
            <p>+91 7087711309</p>
          </div>

          <div class="info_row">
            <span>✉️</span>
            <p>singhshub3004@gmail.com</p>
          </div>

          <div class="info_row">
            <span>📍</span>
            <p>B004,00955 Kharar, Dashmesh Nagar<br>Chandigarh</p>
          </div>
        </div>

        <div class="socials">
          <span>🔵</span>
          <span>📸</span>
          <span>💼</span>
        </div>

        <!-- SVG Decoration -->
        <div class="decor_svg">
          <svg class="big_circle" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="100" fill="#1e293b"/>
          </svg>

          <svg class="small_circle" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="50" fill="#2c3a4d"/>
          </svg>
        </div>

      </div>

      <!-- RIGHT -->
      <div class="contact_form">
        <form>

          <div class="form_grid">
            <div>
              <label>First Name</label>
              <input type="text" placeholder="First Name">
            </div>

            <div>
              <label>Last Name</label>
              <input type="text" placeholder="Last Name">
            </div>

            <div>
              <label>Email</label>
              <input type="email" placeholder="demo@example.com">
            </div>

            <div>
              <label>Phone Number</label>
              <input type="tel" placeholder="Enter Your No.">
            </div>
          </div>

          <div class="subject">
            <h3>Select Subject?</h3>
            <div class="radio_group">
              <label><input type="radio" name="sub"> General Enquiry</label>
              <label><input type="radio" name="sub"> Work</label>
              <label><input type="radio" name="sub"> Upwork</label>
              <label><input type="radio" name="sub"> Other</label>
            </div>
          </div>

          <div class="message">
            <label>Message</label>
            <input type="text" placeholder="Write Message">
          </div>

          <button class="submit_btn">Send Message</button>

        </form>
      </div>

    </div>
  </div>
</section>

</body>
</html>
